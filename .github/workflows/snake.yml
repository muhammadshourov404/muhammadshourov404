name: Generate Matrix-Red Contribution Snake

on:
  schedule:
    # প্রতি ৬ ঘণ্টা পরপর (ঘন ঘন আপডেট চাইলে ০ */6 * * *)
    - cron: "0 */6 * * *"
  workflow_dispatch:          # ম্যানুয়ালি রান করার বাটন
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'           # README চেঞ্জ হলে অপ্রয়োজনীয় রান না হয়

permissions:
  contents: write             # output ব্রাঞ্চে পুশ করার জন্য দরকারী

jobs:
  generate-snake:
    name: Build Matrix-Red Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Snake SVGs - Matrix Red Theme
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            output/github-snake-matrix-red.svg?color_snake=8B0000,FF0000,FF4500,DC143C,FFFFFF&color_dots=0a0a0a,1a0000,2a0000,4a0000,8B0000,FF0000,FF4500
            output/github-snake-dark.svg?palette=github-dark
            output/github-snake-vampire.svg?color_snake=8B0000,DC143C,FF0000,FF4500,FFFFFF&color_dots=000000,0a0a0a,1a0000,2a0000,4a0000,8B0000,FF0000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Snake Generation Succeeded
        if: steps.snake.outcome == 'failure'
        run: |
          echo "Snake generation failed! Check logs above."
          exit 1

      - name: Deploy Snake Files to output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: output
          commit_message: "chore: update matrix-red contribution snake [skip ci]"
          fqdn: ""                  # custom domain না থাকলে খালি
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workflow Summary
        run: |
          echo "Matrix-Red Snake generated successfully!"
          echo "Files pushed to output branch:"
          ls -la output/
